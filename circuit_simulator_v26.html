<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電気回路シミュレーター</title>
<style>
:root{--bg:#fdf6ff;--panel:#fff0f8;--panel2:#fce8f5;--border:#f0b8dc;--accent:#e05aaa;--green:#34c77b;--yellow:#ffb347;--red:#ff6b6b;--text:#3a2040;--text2:#a07090;--shadow:rgba(220,100,180,0.13);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP','Hiragino Maru Gothic Pro',sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
header{background:linear-gradient(135deg,#ff9de2,#c77dff);border-bottom:3px solid #e05aaa;padding:6px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 12px rgba(200,80,200,.2);}
header h1{font-size:15px;font-weight:800;color:#fff;letter-spacing:.05em;white-space:nowrap;}
.toolbar{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap;align-items:center;}
.btn{padding:5px 11px;border:none;border-radius:18px;cursor:pointer;font-size:11px;font-weight:700;transition:all .15s;box-shadow:0 2px 5px rgba(0,0,0,.12);white-space:nowrap;}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,0,0,.15);}
.btn-delete{background:linear-gradient(135deg,#ff6b6b,#ff8e53);color:#fff;}
.btn-save{background:linear-gradient(135deg,#c77dff,#9b59b6);color:#fff;}
.btn-load{background:linear-gradient(135deg,#74b9ff,#0984e3);color:#fff;}
.btn-img{background:linear-gradient(135deg,#fd9644,#e55039);color:#fff;}
.btn-clear{background:#fff;color:var(--text2);border:2px solid var(--border);}
.btn-check{background:linear-gradient(135deg,#34c77b,#00b09b);color:#fff;}
.btn-sim{background:linear-gradient(135deg,#0984e3,#6c5ce7);color:#fff;}
.btn-sim-exit{background:linear-gradient(135deg,#ff6b6b,#ff8e53);color:#fff;}
#info-bar{background:rgba(255,255,255,0.92);border-bottom:2px solid var(--border);padding:5px 14px;display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
#info-bar label{font-size:10px;color:var(--text2);font-weight:700;white-space:nowrap;}
#info-bar input{border:1.5px solid var(--border);border-radius:8px;padding:3px 7px;font-size:11px;color:var(--text);background:#fff;outline:none;transition:border-color .15s;}
#info-bar input:focus{border-color:var(--accent);}
#info-bar input.err{border-color:var(--red);background:#fff5f5;}
.info-group{display:flex;align-items:center;gap:4px;}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:176px;background:var(--panel);border-right:3px solid var(--border);overflow-y:auto;flex-shrink:0;padding:8px 6px;}
.palette-section{margin-bottom:8px;}
.palette-section-title{font-size:9px;font-weight:800;color:#fff;text-align:center;border-radius:6px;padding:2px 0;margin-bottom:5px;}
.sec-load .palette-section-title{background:#2176ae;}
.sec-switch .palette-section-title{background:#d4750a;}
.palette-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.palette-item{background:#fff;border:2px solid var(--border);border-radius:8px;padding:4px 2px;cursor:grab;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px;box-shadow:0 1px 4px var(--shadow);}
.palette-item:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(224,90,170,.25);}
.palette-item img{width:76px;height:57px;object-fit:contain;border-radius:4px;display:block;}
.palette-item .plabel{font-size:8px;color:var(--text2);text-align:center;line-height:1.2;}
.canvas-wrapper{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#sim-bar{background:linear-gradient(135deg,#e8f8ef,#d4f5e2);border-bottom:2px solid #a8e6c0;padding:6px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;}
#sim-bar .sim-label{font-size:11px;font-weight:800;color:#1a7a3a;white-space:nowrap;}
#sim-status{font-size:11px;color:#1a7a3a;margin-left:4px;font-weight:600;}
.canvas-area{flex:1;position:relative;overflow:hidden;background:var(--bg);background-image:linear-gradient(rgba(220,150,220,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(220,150,220,.12) 1px,transparent 1px);background-size:24px 24px;}
.canvas-area.sim-mode{background-color:#f0f8ff;}
#canvas-inner{position:absolute;top:0;left:0;width:100%;height:100%;transform-origin:top left;transition:transform .15s;}
#canvas-inner #units-layer,#canvas-inner #canvas-svg,#canvas-inner #handle-layer{position:absolute;top:0;left:0;width:100%;height:100%;}
#units-layer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;}
#canvas-svg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;}
#handle-layer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:3;pointer-events:none;}
.unit-block{position:absolute;cursor:move;user-select:none;}
.unit-block.battery-unit{cursor:default;}
.unit-img{object-fit:contain;display:block;border-radius:10px;border:2.5px solid transparent;transition:border-color .15s,box-shadow .15s;box-shadow:0 3px 12px var(--shadow);pointer-events:none;}
.unit-block:hover .unit-img{box-shadow:0 6px 20px rgba(200,80,200,.25);}
.unit-block.selected .unit-img{border-color:var(--accent);box-shadow:0 0 0 3px rgba(224,90,170,.3),0 6px 20px rgba(200,80,200,.3);}
/* シミュレーション用 */
.unit-block.sim-switch{cursor:pointer;}
.unit-block.sim-switch:hover .unit-img{box-shadow:0 0 0 3px #888,0 4px 12px rgba(0,0,0,.3)!important;}
/* スイッチON/OFFラベル */
.sim-sw-label{position:absolute;font-size:10px;font-weight:800;border-radius:8px;padding:2px 8px;white-space:nowrap;z-index:5;pointer-events:none;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.sim-sw-label.on{background:#00b09b;color:#fff;}
.sim-sw-label.off{background:#888;color:#fff;}
/* 負荷ON/OFFラベル */
.sim-load-label{position:absolute;font-size:10px;font-weight:800;border-radius:8px;padding:2px 8px;white-space:nowrap;z-index:5;pointer-events:none;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.sim-load-label.on{background:#ffd700;color:#333;box-shadow:0 0 8px rgba(255,210,0,.8);}
.sim-load-label.off{background:#ccc;color:#555;}
/* 負荷点灯エフェクト */
.unit-block.load-on .unit-img{box-shadow:0 0 0 4px #ffd700,0 0 20px 6px rgba(255,210,0,.6)!important;border-color:#ffd700!important;}
/* スイッチON枠 */
.unit-block.sw-on .unit-img{box-shadow:0 0 0 4px #00b09b,0 0 14px 3px rgba(0,176,155,.5)!important;border-color:#00b09b!important;}
.pin-dot{position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;border:2.5px solid var(--accent);color:#c0306a;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:crosshair;transition:all .15s;z-index:10;box-shadow:0 2px 8px rgba(200,80,200,.35);transform:translate(-50%,-50%);}
.pin-dot:hover{transform:translate(-50%,-50%) scale(1.25);background:var(--accent);color:#fff;}
.pin-dot.active{background:var(--accent);color:#fff;animation:pinPulse .7s infinite;}
@keyframes pinPulse{0%,100%{box-shadow:0 0 0 0 rgba(224,90,170,.5);}50%{box-shadow:0 0 0 8px rgba(224,90,170,0);}}
.wire-handle-div{position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;border:2.5px solid #9b59b6;cursor:move;transform:translate(-50%,-50%);pointer-events:all;box-shadow:0 2px 8px rgba(150,90,200,.4);transition:background .1s;}
.wire-handle-div:hover{background:#e8d5ff;transform:translate(-50%,-50%) scale(1.2);}
.wire-handle-div.selected-wire-handle{border-color:var(--red);background:#ffe0e0;}
#mode-bar,#wire-del-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);border-radius:20px;padding:5px 18px;font-size:12px;display:none;z-index:50;white-space:nowrap;font-weight:700;}
#mode-bar{background:rgba(199,125,255,.15);border:2px solid #c77dff;color:#9b59b6;}
#wire-del-bar{background:rgba(255,107,107,.15);border:2px solid var(--red);color:var(--red);}
#mode-bar.show,#wire-del-bar.show{display:block;}
#result-panel{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:#fff;border:3px solid var(--border);border-radius:16px;padding:14px 20px 12px;min-width:300px;max-width:520px;display:none;z-index:100;box-shadow:0 8px 32px rgba(200,80,200,.2);}
#result-panel.show{display:block;animation:slideUp .2s ease;}
@keyframes slideUp{from{transform:translateX(-50%) translateY(12px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
#result-panel h3{font-size:14px;margin-bottom:10px;font-weight:800;}
.result-item{display:flex;align-items:flex-start;gap:8px;font-size:12px;margin-bottom:5px;line-height:1.5;}
.r-ok{color:var(--green);}.r-ng{color:var(--red);}.r-warn{color:var(--yellow);}
.result-close{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;}
.hint-bar{position:absolute;bottom:8px;right:12px;font-size:10px;color:var(--text2);text-align:right;line-height:1.8;pointer-events:none;}
@keyframes blinkWarn{0%,100%{opacity:1;background:rgba(255,180,0,.25);}50%{opacity:.5;background:rgba(255,80,0,.15);}}
.sim-status-warn{animation:blinkWarn .9s ease-in-out infinite;border-radius:10px;padding:2px 10px;color:#c0390a!important;font-weight:800!important;}
#info-popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;}
#info-popup.show{display:flex;}
#info-popup-box{background:#fff;border-radius:16px;padding:22px 28px;max-width:320px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.3);}
#info-popup-box h3{font-size:15px;font-weight:800;margin-bottom:8px;color:var(--red);}
#info-popup-box p{font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6;}
#info-popup-box ul{font-size:13px;color:var(--red);margin-bottom:16px;padding-left:18px;line-height:1.8;}
#info-popup-box button{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer;width:100%;}
</style>
</head>

<script>
function getIcon(k){const e=document.getElementById('icon-'+k);return e?e.src:'';}
const IMG_W=120,IMG_H=90,PADDING=30,STUB=26;
const BATTERY_ID='battery-fixed';
// 負荷の表示名
const LOAD_LABELS={'led1':'LED 1個','led2':'LED 2個','led3':'LED 3個','buzzer':'ブザー'};

const UNIT_DEFS=[
  {type:'battery',label:'電池ボックス',icon:'battery',category:'power',section:'power',pins:[

    {id:'p4',num:4,role:'neutral',side:'left', frac:0.70},

    {id:'p2',num:2,role:'power',  side:'left',  frac:0.55},

function getPinXY(pin){
  const P=PADDING;
  if(pin.side==='left')   return{x:P,              y:P+IMG_H*pin.frac};
  if(pin.side==='right')  return{x:P+IMG_W,        y:P+IMG_H*pin.frac};
  if(pin.side==='top')    return{x:P+IMG_W*pin.frac,y:P};
  if(pin.side==='bottom') return{x:P+IMG_W*pin.frac,y:P+IMG_H};
  return{x:P+IMG_W/2,y:P+IMG_H/2};
}

let units=[],wires=[],selectedUnit=null,selectedWire=null,pendingPin=null,dragging=null;
let mousePos={x:0,y:0},nextId=1;
let simMode=false,switchStates={};

function isH(s){return s==='left'||s==='right';}
function isV(s){return s==='top'||s==='bottom';}
function stb(p,s){
  if(s==='left')  return{x:p.x-STUB,y:p.y};if(s==='right') return{x:p.x+STUB,y:p.y};
  if(s==='top')   return{x:p.x,y:p.y-STUB};if(s==='bottom')return{x:p.x,y:p.y+STUB};
  return{...p};
}
function wireMode(s1,s2){
  if(isH(s1)&&isH(s2))return 'HH';if(isV(s1)&&isV(s2))return 'VV';
  if(isH(s1)&&isV(s2))return 'HV';return 'VH';
}
function initHandles(p1,s1,p2,s2){
  const a=stb(p1,s1),b=stb(p2,s2),mode=wireMode(s1,s2);
  if(mode==='HH')return [{x:(a.x+b.x)/2,y:(a.y+b.y)/2}];
  if(mode==='VV')return [{x:(a.x+b.x)/2,y:(a.y+b.y)/2}];
  if(mode==='HV')return [{x:b.x,y:a.y},{x:b.x,y:b.y}];
  return [{x:a.x,y:b.y},{x:b.x,y:b.y}];
}
function buildPts(p1,s1,p2,s2,handles){
  const a=stb(p1,s1),b=stb(p2,s2),mode=wireMode(s1,s2),h=handles;
  let mid=[];
  if(mode==='HH')     mid=[{x:h[0].x,y:a.y},{x:h[0].x,y:b.y}];
  else if(mode==='VV')mid=[{x:a.x,y:h[0].y},{x:b.x,y:h[0].y}];
  else if(mode==='HV')mid=[{x:h[0].x,y:a.y},{x:h[0].x,y:h[1].y},{x:b.x,y:h[1].y}];
  else                mid=[{x:a.x,y:h[0].y},{x:h[1].x,y:h[0].y},{x:h[1].x,y:b.y}];
  const all=[p1,a,...mid,b,p2];
  return all.filter((p,i)=>i===0||Math.abs(p.x-all[i-1].x)>0.5||Math.abs(p.y-all[i-1].y)>0.5);
}
function mkPath(pts){return pts.map((p,i)=>(i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');}
function getHandleDisplayPos(p1,s1,p2,s2,handles,idx){
  const a=stb(p1,s1),b=stb(p2,s2),mode=wireMode(s1,s2),h=handles;
  if(mode==='HH')return{x:h[0].x,y:(a.y+b.y)/2};
  if(mode==='VV')return{x:(a.x+b.x)/2,y:h[0].y};
  if(mode==='HV'){if(idx===0)return{x:h[0].x,y:(a.y+h[1].y)/2};return{x:(h[0].x+b.x)/2,y:h[1].y};}
  if(idx===0)return{x:(a.x+h[1].x)/2,y:h[0].y};return{x:h[1].x,y:(h[0].y+b.y)/2};
}
function moveHandle(wire,idx,mx,my){
  const mode=wire.mode,h=wire.handles;
  if(mode==='HH')      h[0].x=mx;
  else if(mode==='VV') h[0].y=my;
  else if(mode==='HV'){if(idx===0)h[0].x=mx;else h[1].y=my;}
  else                 {if(idx===0)h[0].y=my;else h[1].x=mx;}
}

// ===== 回路グラフ構築（修正版）=====
// 電源は内部通過不可（プラスとマイナスを内部で接続しない）
// 負荷は常に内部通過可
// スイッチ系はON時のみ通過可
function buildGraph(switchOnSet){
  const adj={};
  const nk=(uid,pid)=>uid+':'+pid;
  units.forEach(u=>u.def.pins.forEach(p=>{adj[nk(u.id,p.id)]=[];}));
  wires.forEach(w=>{
    const a=nk(w.fromUnit,w.fromPin),b=nk(w.toUnit,w.toPin);
    if(adj[a])adj[a].push(b);
    if(adj[b])adj[b].push(a);
    // タイマー①・光センサー②と電源③の直結は双方向グラフから除外
    // （ショート判定の誤検出防止）
    // これらのピンは「電源から電力供給を受ける入力ピン」なので
    // グラフ上でも一方向扱い: 電源→特殊ピン のみ
    const aUid=w.fromUnit,aPid=w.fromPin,bUid=w.toUnit,bPid=w.toPin;
    if(isSpecialPin(aUid,aPid)&&bUid===BATTERY_ID){
      // 特殊ピン(a) ← 電源(b) の逆方向エッジを除去（ショート誤判定防止）
      if(adj[b]){const idx=adj[b].lastIndexOf(a);if(idx>=0)adj[b].splice(idx,1);}
    }
    if(isSpecialPin(bUid,bPid)&&aUid===BATTERY_ID){
      // 特殊ピン(b) ← 電源(a) の逆方向エッジを除去
      if(adj[a]){const idx=adj[a].lastIndexOf(b);if(idx>=0)adj[a].splice(idx,1);}
    }
  });
  units.forEach(u=>{
    const cat=u.def.category;
    if(cat==='power')return; // 電源は内部通過不可
    const pins=u.def.pins;
    if(u.type==='timer_btn'||u.type==='timer_tilt'||u.type==='lightsensor'){
      // タイマー/光センサー:
      // 条件1: 特殊ピン（タイマー①, 光センサー②）が電源③に直結されていること
      // 条件2: スイッチとしてON状態であること（switchOnSetで管理）
      // 両条件を満たす時のみ⑦↔⑧を通過可
      const spPin=(u.type==='lightsensor')?'p2':'p1';
      const directOk=isSpecialPinDirectConnected(u.id,spPin);
      const swOn=switchOnSet.get(u.id)===true;
      if(!directOk||!swOn)return; // どちらか未満足→通過不可
      // 両条件OK→出力ピン⑦と⑧を接続
      const a=nk(u.id,'p7'),b=nk(u.id,'p8');
      if(adj[a]){adj[a].push(b);adj[b].push(a);}
      return;
    }
    if(u.type==='toggle_sw'){
      // トグル切替: switchStatesの値が 'p2' or 'p6' を示す
      // 'p2'側ON: p2↔p4 が通過可
      // 'p6'側ON: p6↔p4 が通過可
      const side=switchOnSet.get?switchOnSet.get(u.id):null;
      // switchOnSetをMapとして使う場合
      const sw=typeof switchOnSet.get==='function'?switchOnSet.get(u.id):null;
      if(sw==='p2'){
        // ②列ON: p2(②)とp4(④)が通過可
        const a=nk(u.id,'p2'),b=nk(u.id,'p4');
        if(adj[a]){adj[a].push(b);adj[b].push(a);}
      } else if(sw==='p6'){
        // ⑥列ON: p6(⑥)とp4(④)が通過可
        const a=nk(u.id,'p6'),b=nk(u.id,'p4');
        if(adj[a]){adj[a].push(b);adj[b].push(a);}
      }
      return;
    }
    const canPass=cat==='load'||switchOnSet.get(u.id)===true;
    if(!canPass)return;
    for(let i=0;i<pins.length;i++){
      for(let j=i+1;j<pins.length;j++){
        const a=nk(u.id,pins[i].id),b=nk(u.id,pins[j].id);
        if(adj[a])adj[a].push(b);
        if(adj[b])adj[b].push(a);
      }
    }
  });
  return adj;
}

// BFS: startからgoalへ「特定のunitを通過する経路」があるかチェック
function bfsPassingUnit(adj,start,goal,targetUnitId){
  // 電源プラスピン(start)は出発点のみ・再訪問完全禁止
  // → 複数の負荷が電源プラスに接続されていても中継させない
  const visited=new Set();
  const q=[[start,false]];
  visited.add(start+'|0');
  visited.add(start+'|1'); // startへの再訪問を両状態で禁止
  while(q.length){
    const[cur,passed]=q.shift();
    if(cur===goal){
      if(passed)return true;
      continue;
    }
    for(const nxt of(adj[cur]||[])){
      const nuid=nxt.split(':')[0];
      const np=passed||(nuid===targetUnitId);
      const key=nxt+'|'+(np?1:0);
      if(!visited.has(key)){visited.add(key);q.push([nxt,np]);}
    }
  }
  return false;
}

// 任意のUnitを経由せずにstart→goalへ到達できるかチェック（ショート検出用）
function bfsWithoutAnyLoad(adj,start,goal){
  // startへの再訪問禁止（電源プラスを中継させない）
  const loadIds=new Set(units.filter(u=>u.def.category==='load').map(u=>u.id));
  const visited=new Set([start]);
  const q=[start];
  while(q.length){
    const cur=q.shift();
    if(cur===goal)return true;
    for(const nxt of(adj[cur]||[])){
      const nuid=nxt.split(':')[0];
      if(loadIds.has(nuid))continue;
      if(nxt===start)continue; // startへの再訪問禁止
      if(!visited.has(nxt)){visited.add(nxt);q.push(nxt);}
    }
  }
  return false;
}

function getCircuitStatus(switchOnSet){
  // switchOnSet: Map<unitId, bool|'p2'|'p6'>
  const bat=units.find(u=>u.id===BATTERY_ID);if(!bat)return{hasNormal:false,hasShort:false,litLoads:[]};
  const plusPin=bat.def.pins.find(p=>p.role==='plus');
  const minusPin=bat.def.pins.find(p=>p.role==='minus');
  if(!plusPin||!minusPin)return{hasNormal:false,hasShort:false,litLoads:[]};
  const adj=buildGraph(switchOnSet);
  const nk=(uid,pid)=>uid+':'+pid;
  const start=nk(bat.id,plusPin.id),goal=nk(bat.id,minusPin.id);
  // ショート: 負荷を通らずにループ
  const hasShort=bfsWithoutAnyLoad(adj,start,goal);
  // 各負荷が点灯するか
  const loadUnits=units.filter(u=>u.def.category==='load');
  const litLoads=loadUnits.filter(lu=>bfsPassingUnit(adj,start,goal,lu.id));
  const hasNormal=litLoads.length>0;
  return{hasNormal,hasShort,litLoads};
}

// ===== パレット =====
function buildPalette(){
  const el=document.getElementById('palette');
  [{key:'load',label:'💡 負荷'},{key:'switch',label:'🔀 スイッチ'}].forEach(sec=>{
    const defs=UNIT_DEFS.filter(d=>d.section===sec.key);if(!defs.length)return;
    const wrap=document.createElement('div');wrap.className='palette-section sec-'+sec.key;
    const title=document.createElement('div');title.className='palette-section-title';title.textContent=sec.label;
    wrap.appendChild(title);
    const grid=document.createElement('div');grid.className='palette-grid';
    defs.forEach(def=>{
      const item=document.createElement('div');item.className='palette-item';item.draggable=true;
      const img=document.createElement('img');img.src=getIcon(def.icon);img.alt=def.label;
      const lbl=document.createElement('span');lbl.className='plabel';lbl.textContent=def.label;
      item.append(img,lbl);
      item.addEventListener('dragstart',e=>e.dataTransfer.setData('unit-type',def.type));
      item.addEventListener('click',()=>{if(simMode)return;
        const cv=document.getElementById('canvas'),m=90;
        addUnit(def.type,m+Math.random()*(cv.clientWidth-m*3),m+Math.random()*(cv.clientHeight-m*2));
      });
      grid.appendChild(item);
    });
    wrap.appendChild(grid);el.appendChild(wrap);
  });
}
function placeBattery(){
  const def=UNIT_DEFS.find(d=>d.type==='battery');
  // 左下に配置: キャンバスの高さ - 電池の高さ - 余白
  const cv=document.getElementById('canvas');
  const cvH=cv.clientHeight||500;
  const initY=Math.max(30, cvH - IMG_H - PADDING*2 - 20);
  const unit={id:BATTERY_ID,type:'battery',x:20,y:initY,def,fixed:true};
  units.push(unit);renderUnit(unit);
}
function onDrop(e){
  if(simMode)return;e.preventDefault();
  const type=e.dataTransfer.getData('unit-type');if(!type)return;
  const _dp=canvasPos(e.clientX,e.clientY);
  addUnit(type,_dp.x-IMG_W/2,_dp.y-IMG_H/2);
}
function addUnit(type,x,y){
  const def=UNIT_DEFS.find(d=>d.type===type);if(!def)return;
  const id='u'+(nextId++),unit={id,type,x,y,def};units.push(unit);renderUnit(unit);renderAll();
}
function renderUnit(unit){
  const layer=document.getElementById('units-layer');
  let el=document.getElementById(unit.id);
  if(!el){
    el=document.createElement('div');el.id=unit.id;el.className='unit-block';
    if(unit.fixed)el.classList.add('battery-unit');
    el.style.width=(IMG_W+2*PADDING)+'px';el.style.height=(IMG_H+2*PADDING)+'px';
    layer.appendChild(el);
    if(!unit.fixed)el.addEventListener('contextmenu',e=>{if(simMode)return;e.preventDefault();removeUnit(unit.id);});
    el.addEventListener('mousedown',e=>{if(simMode)return;if(!e.target.classList.contains('pin-dot'))startDragUnit(e,unit.id);});
    el.addEventListener('click',e=>{
      if(simMode){
        if(unit.def.category==='switch'||unit.def.category==='timer'){e.stopPropagation();toggleSwitch(unit.id);}
        return;
      }
      if(!e.target.classList.contains('pin-dot')){e.stopPropagation();selectUnit(unit.id);}
    });
  }
  el.style.left=(unit.x-PADDING)+'px';el.style.top=(unit.y-PADDING)+'px';
  el.innerHTML='';
  const img=document.createElement('img');img.className='unit-img';img.src=getIcon(unit.def.icon);img.alt=unit.def.label;
  img.style.cssText='position:absolute;left:'+PADDING+'px;top:'+PADDING+'px;width:'+IMG_W+'px;height:'+IMG_H+'px;';
  el.appendChild(img);
  unit.def.pins.forEach(pin=>{
    const xy=getPinXY(pin);
    const dot=document.createElement('div');dot.className='pin-dot';dot.id=unit.id+'-'+pin.id;
    dot.textContent=pin.num;dot.title=pin.num+'番端子';dot.style.left=xy.x+'px';dot.style.top=xy.y+'px';
    dot.addEventListener('click',e=>{if(simMode)return;e.stopPropagation();pinClick(unit.id,pin.id);});
    el.appendChild(dot);
  });
}
function startDragUnit(e,uid){
  if(e.button!==0)return;e.preventDefault();
  const u=units.find(u=>u.id===uid);
  dragging={type:'unit',unitId:uid,sx:e.clientX,sy:e.clientY,ox:u.x,oy:u.y};
  selectUnit(uid);selectWire(null);
}
document.addEventListener('mousemove',e=>{
  const _cp=canvasPos(e.clientX,e.clientY);
  mousePos={x:_cp.x,y:_cp.y};
  if(dragging&&!simMode){
    if(dragging.type==='unit'){
      const dx=e.clientX-dragging.sx,dy=e.clientY-dragging.sy;
      const u=units.find(u=>u.id===dragging.unitId);
      u.x=Math.max(0,dragging.ox+dx);u.y=Math.max(0,dragging.oy+dy);
      const el=document.getElementById(u.id);
      el.style.left=(u.x-PADDING)+'px';el.style.top=(u.y-PADDING)+'px';
    } else if(dragging.type==='handle'){
      const wire=wires.find(w=>w.id===dragging.wireId);
      if(wire)moveHandle(wire,dragging.idx,mousePos.x,mousePos.y);
    }
    renderAll();return;
  }
  if(pendingPin)renderAll();
});
document.addEventListener('mouseup',()=>{dragging=null;});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){cancelPending();selectWire(null);}
  if((e.key==='Delete'||e.key==='Backspace')&&!simMode){
    if(document.activeElement&&document.activeElement.tagName==='INPUT')return;
    if(selectedWire){removeWire(selectedWire);selectWire(null);}
    else if(selectedUnit&&selectedUnit!==BATTERY_ID){removeUnit(selectedUnit);}
  }
});
document.getElementById('canvas').addEventListener('click',e=>{
  if(simMode)return;
  if(!e.target.closest('.unit-block')&&!e.target.closest('.wire-handle-div')){
    selectUnit(null);selectWire(null);if(pendingPin)cancelPending();
  }
});
function getPinSVGPos(uid,pid){
  const el=document.getElementById(uid+'-'+pid);if(!el)return null;
  const cr=document.getElementById('canvas').getBoundingClientRect();
  const pr=el.getBoundingClientRect();
  // scaleを除いた実座標に変換
  return{
    x:(pr.left-cr.left+pr.width/2)/canvasScale,
    y:(pr.top-cr.top+pr.height/2)/canvasScale
  };
}
function pinClick(uid,pid){
  if(simMode)return;selectWire(null);
  if(!pendingPin){
    pendingPin={unitId:uid,pinId:pid};document.getElementById('mode-bar').classList.add('show');
    document.getElementById(uid+'-'+pid)?.classList.add('active');
  } else {
    if(pendingPin.unitId===uid){cancelPending();return;}
    const dup=wires.find(w=>(w.fromUnit===pendingPin.unitId&&w.fromPin===pendingPin.pinId&&w.toUnit===uid&&w.toPin===pid)||(w.fromUnit===uid&&w.fromPin===pid&&w.toUnit===pendingPin.unitId&&w.toPin===pendingPin.pinId));
    if(!dup){
      const u1=units.find(u=>u.id===pendingPin.unitId),pin1=u1?.def.pins.find(p=>p.id===pendingPin.pinId);
      const u2=units.find(u=>u.id===uid),pin2=u2?.def.pins.find(p=>p.id===pid);
      const p1=getPinSVGPos(pendingPin.unitId,pendingPin.pinId)||{x:0,y:0};
      const p2=getPinSVGPos(uid,pid)||{x:0,y:0};
      const s1=pin1?.side||'right',s2=pin2?.side||'left';
      wires.push({id:'w'+(nextId++),fromUnit:pendingPin.unitId,fromPin:pendingPin.pinId,
        toUnit:uid,toPin:pid,s1,s2,mode:wireMode(s1,s2),handles:initHandles(p1,s1,p2,s2)});
    }
    cancelPending();renderAll();
  }
}
function cancelPending(){
  if(pendingPin)document.getElementById(pendingPin.unitId+'-'+pendingPin.pinId)?.classList.remove('active');
  pendingPin=null;document.getElementById('mode-bar').classList.remove('show');renderAll();
}
function selectWire(wid){
  selectedWire=wid;
  document.getElementById('wire-del-bar').classList.toggle('show',!!wid&&!simMode);
  renderAll();
}
function renderAll(){renderWires();}
function renderWires(){
  const svg=document.getElementById('canvas-svg');svg.innerHTML='';
  const hl=document.getElementById('handle-layer');hl.innerHTML='';
  wires.forEach(wire=>{
    const p1=getPinSVGPos(wire.fromUnit,wire.fromPin),p2=getPinSVGPos(wire.toUnit,wire.toPin);
    if(!p1||!p2)return;
    const u1=units.find(u=>u.id===wire.fromUnit),u2=units.find(u=>u.id===wire.toUnit);
    const pin1=u1?.def.pins.find(p=>p.id===wire.fromPin),pin2=u2?.def.pins.find(p=>p.id===wire.toPin);
    const s1=pin1?.side||wire.s1||'right',s2=pin2?.side||wire.s2||'left';
    if(!wire.mode||!wire.handles){wire.mode=wireMode(s1,s2);wire.handles=initHandles(p1,s1,p2,s2);}
    const pts=buildPts(p1,s1,p2,s2,wire.handles);
    const isSel=wire.id===selectedWire;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',mkPath(pts));
    path.setAttribute('stroke',isSel?'#ff4444':'#9b59b6');path.setAttribute('stroke-width',isSel?'4':'2.5');
    path.setAttribute('fill','none');path.setAttribute('stroke-linecap','square');path.setAttribute('stroke-linejoin','miter');
    if(isSel)path.setAttribute('stroke-dasharray','8 4');
    path.style.pointerEvents='stroke';path.style.cursor=simMode?'default':'pointer';
    if(!simMode)path.addEventListener('click',e=>{e.stopPropagation();selectWire(wire.id);selectUnit(null);cancelPending();});
    svg.appendChild(path);
    if(!simMode){
      wire.handles.forEach((h,idx)=>{
        const dp=getHandleDisplayPos(p1,s1,p2,s2,wire.handles,idx);
        const d=document.createElement('div');d.className='wire-handle-div'+(isSel?' selected-wire-handle':'');
        d.style.left=dp.x+'px';d.style.top=dp.y+'px';
        d.addEventListener('mousedown',e=>{e.stopPropagation();e.preventDefault();selectWire(wire.id);dragging={type:'handle',wireId:wire.id,idx};});
        hl.appendChild(d);
      });
    }
  });
  if(pendingPin){
    const pp=getPinSVGPos(pendingPin.unitId,pendingPin.pinId);
    const u1=units.find(u=>u.id===pendingPin.unitId);
    const pin1=u1?.def.pins.find(p=>p.id===pendingPin.pinId);
    if(pp){
      const s1=pin1?.side||'right',handles=initHandles(pp,s1,mousePos,'left');
      const pts=buildPts(pp,s1,mousePos,'left',handles);
      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',mkPath(pts));path.setAttribute('stroke','#34c77b');
      path.setAttribute('stroke-width','2');path.setAttribute('fill','none');path.setAttribute('stroke-dasharray','7 4');
      path.style.pointerEvents='none';svg.appendChild(path);
    }
  }
}
function removeUnit(id){
  if(id===BATTERY_ID)return;
  units=units.filter(u=>u.id!==id);wires=wires.filter(w=>w.fromUnit!==id&&w.toUnit!==id);
  document.getElementById(id)?.remove();if(selectedUnit===id)selectUnit(null);renderAll();
}
function removeWire(wid){wires=wires.filter(w=>w.id!==wid);renderAll();}
function selectUnit(id){
  if(selectedUnit)document.getElementById(selectedUnit)?.classList.remove('selected');
  selectedUnit=id;
  if(id&&id!==BATTERY_ID){document.getElementById(id)?.classList.add('selected');document.getElementById('del-btn').style.display='';}
  else document.getElementById('del-btn').style.display='none';
}
function deleteSelected(){
  if(selectedWire){removeWire(selectedWire);selectWire(null);}
  else if(selectedUnit&&selectedUnit!==BATTERY_ID)removeUnit(selectedUnit);
}
function clearAll(){
  if(!confirm('電源以外をすべて消去しますか？'))return;
  if(simMode)exitSim();
  units=units.filter(u=>u.id===BATTERY_ID);wires=[];
  document.querySelectorAll('#units-layer .unit-block:not(#'+BATTERY_ID+')').forEach(e=>e.remove());
  document.getElementById('handle-layer').innerHTML='';document.getElementById('canvas-svg').innerHTML='';
  selectUnit(null);selectWire(null);
}

// ===== 動作確認（静的）=====
function checkCircuit(){
  closeResult();
  const R=[];let ok=true;
  const hasLoad=units.some(u=>u.def.category==='load');
  const hasSw=units.some(u=>u.def.category==='switch'||u.def.category==='timer');
  R.push({t:'ok',m:'✅ 電源（電池ボックス）が配置されています'});
  if(!hasLoad){R.push({t:'ng',m:'❌ 負荷（LED・ブザー）が配置されていません'});ok=false;}
  else R.push({t:'ok',m:'✅ 負荷が配置されています'});
  if(!hasSw)R.push({t:'warn',m:'⚠️ スイッチ類が配置されていません（推奨）'});
  else R.push({t:'ok',m:'✅ スイッチが配置されています'});
  if(wires.length===0){R.push({t:'ng',m:'❌ 配線がありません'});ok=false;}
  if(wires.length>0&&hasLoad){
    // 静的チェック: 通常スイッチは全ON、トグル切替は②列ON
    const allSwMap=new Map();
    units.filter(u=>u.def.category==='switch'||u.def.category==='timer').forEach(u=>{
      if(u.type==='toggle_sw') allSwMap.set(u.id,'p2');
      else allSwMap.set(u.id,true);
    });
    const{hasNormal,hasShort,litLoads}=getCircuitStatus(allSwMap);
    if(hasShort){R.push({t:'ng',m:'❌ ショートの危険：負荷を通らずに電源がループしています'});ok=false;}
    if(hasNormal) R.push({t:'ok',m:'✅ 電源→負荷→電源の正しい回路ができています（点灯する負荷：'+litLoads.map(u=>u.def.label).join('・')+'）'});
    else if(!hasShort) R.push({t:'warn',m:'⚠️ 回路が一周していません（電源から負荷を通って戻ってきていない）'});
  }
  units.filter(u=>u.def.category==='load').forEach(lu=>{
    if(!wires.some(w=>w.fromUnit===lu.id||w.toUnit===lu.id))R.push({t:'warn',m:'⚠️ '+lu.def.label+'がどこにも接続されていません'});
  });
  // タイマー/光センサーの電源直結チェック
  checkSpecialUnits(R);
  showResult(ok,R);
}
// タイマーユニットと光センサーユニットの特殊ルールチェック
function checkSpecialUnits(R){
  const bat=units.find(u=>u.id===BATTERY_ID);
  if(!bat)return;
  const batPlusPin=bat.def.pins.find(p=>p.role==='plus'); // p3
  if(!batPlusPin)return;

  // チェック対象: タイマー(p1=powerピン), 光センサー(p2=powerピン)
  const specials=[
    {types:['timer_btn','timer_tilt'],pinId:'p1',unitLabel:'タイマーユニット',label:'タイマーユニットの①番'},
    {types:['lightsensor'],pinId:'p2',unitLabel:'光センサーユニット',label:'光センサーユニットの②番'},
  ];

  specials.forEach(spec=>{
    units.filter(u=>spec.types.includes(u.type)).forEach(unit=>{
      // このユニットのspecピンに接続されている配線を取得
      const connWires=wires.filter(w=>
        (w.fromUnit===unit.id&&w.fromPin===spec.pinId)||
        (w.toUnit===unit.id&&w.toPin===spec.pinId)
      );
      if(connWires.length===0){
        R.push({t:'warn',m:'⚠️ '+spec.label+'は電源③に直接接続してください（未接続）'});
        return;
      }
      // 直結チェック: 接続先が電源③ピンかどうか
      const isDirectToPlus=connWires.some(w=>{
        const otherId=w.fromUnit===unit.id?w.toUnit:w.fromUnit;
        const otherPin=w.fromUnit===unit.id?w.toPin:w.fromPin;
        return otherId===BATTERY_ID&&otherPin===batPlusPin.id;
      });
      if(isDirectToPlus){
        R.push({t:'ok',m:'✅ '+spec.label+'が電源③に直接接続されています'});
      } else {
        R.push({t:'ng',m:'❌ '+spec.label+'は電源③（プラス）に直接接続してください（間に他の部品を挟まないでください）'});
      }
    });
  });
}

// ショートチェックでタイマー/光センサーの電源直結を除外
function isSpecialPin(unitId,pinId){
  // タイマーのp1、光センサーのp2は電源プラスに直結が必要なピン
  const unit=units.find(u=>u.id===unitId);
  if(!unit)return false;
  if((unit.type==='timer_btn'||unit.type==='timer_tilt')&&pinId==='p1')return true;
  if(unit.type==='lightsensor'&&pinId==='p2')return true;
  return false;
}

function isSpecialPinDirectConnected(unitId,pinId){
  // 指定した特殊ピンが電源③に直接1本の配線で繋がっているか確認
  const bat=units.find(u=>u.id===BATTERY_ID);if(!bat)return false;
  const batPlusPin=bat.def.pins.find(p=>p.role==='plus');if(!batPlusPin)return false;
  return wires.some(w=>{
    const aIsSpecial=(w.fromUnit===unitId&&w.fromPin===pinId);
    const bIsSpecial=(w.toUnit===unitId&&w.toPin===pinId);
    if(aIsSpecial) return w.toUnit===BATTERY_ID&&w.toPin===batPlusPin.id;
    if(bIsSpecial) return w.fromUnit===BATTERY_ID&&w.fromPin===batPlusPin.id;
    return false;
  });
}

function showResult(ok,R){
  document.getElementById('result-title').innerHTML=ok?'<span style="color:var(--green)">✅ 回路OK！🎉</span>':'<span style="color:var(--red)">⚠️ 回路に問題があります</span>';
  document.getElementById('result-body').innerHTML=R.map(r=>'<div class="result-item r-'+r.t+'">'+r.m+'</div>').join('');
  document.getElementById('result-panel').classList.add('show');
}
function closeResult(){document.getElementById('result-panel').classList.remove('show');}

// ===== シミュレーション =====
function enterSim(){
  closeResult();simMode=true;
  switchStates=new Map();
  units.filter(u=>u.def.category==='switch'||u.def.category==='timer').forEach(u=>{
    if(u.type==='toggle_sw') switchStates.set(u.id,'p2'); // 初期値:②列ON
    else switchStates.set(u.id,false);
  });
  document.getElementById('canvas').classList.add('sim-mode');
  document.getElementById('sim-exit-btn').style.display='';
  document.getElementById('check-btn').style.display='none';
  document.getElementById('sim-btn').style.display='none';
  document.querySelectorAll('.pin-dot').forEach(p=>p.style.display='none');
  document.getElementById('handle-layer').innerHTML='';
  units.filter(u=>u.def.category==='switch'||u.def.category==='timer').forEach(u=>{
    document.getElementById(u.id)?.classList.add('sim-switch');
  });
  updateSimDisplay();
}
function exitSim(){
  simMode=false;switchStates={};
  // タイマー自動OFFをキャンセル
  Object.values(timerAutoOff).forEach(t=>clearTimeout(t));
  Object.keys(timerAutoOff).forEach(k=>delete timerAutoOff[k]);
  document.getElementById('canvas').classList.remove('sim-mode');
  document.getElementById('sim-exit-btn').style.display='none';
  document.getElementById('check-btn').style.display='';
  document.getElementById('sim-btn').style.display='';
  const simSt=document.getElementById('sim-status');
  simSt.textContent='';simSt.classList.remove('sim-status-warn');
  document.querySelectorAll('.pin-dot').forEach(p=>p.style.display='');
  // シミュレーション用クラス除去
  units.forEach(u=>{
    const el=document.getElementById(u.id);if(!el)return;
    el.classList.remove('sim-switch','sw-on','load-on');
    // シミュレーションラベル除去
    el.querySelectorAll('.sim-sw-label,.sim-sw-label-p2,.sim-sw-label-p6,.sim-load-label').forEach(l=>l.remove());
  });
  renderAll();
}
// タイマー自動OFFのタイマーID管理
const timerAutoOff={};

function toggleSwitch(uid){
  if(!simMode)return;
  const unit=units.find(u=>u.id===uid);
  if(unit&&unit.type==='toggle_sw'){
    const cur=switchStates.get(uid);
    switchStates.set(uid,cur==='p2'?'p6':'p2');
  } else if(unit&&(unit.type==='timer_btn'||unit.type==='timer_tilt')){
    // タイマー: ONにして2秒後に自動OFF
    if(switchStates.get(uid))return; // すでにON中は無視
    switchStates.set(uid,true);
    document.getElementById(uid)?.classList.add('sw-on');
    // 既存タイマーをキャンセル
    if(timerAutoOff[uid])clearTimeout(timerAutoOff[uid]);
    timerAutoOff[uid]=setTimeout(()=>{
      if(!simMode)return;
      switchStates.set(uid,false);
      document.getElementById(uid)?.classList.remove('sw-on');
      delete timerAutoOff[uid];
      updateSimDisplay();
    },2000);
  } else {
    switchStates.set(uid,!switchStates.get(uid));
    document.getElementById(uid)?.classList.toggle('sw-on',switchStates.get(uid));
  }
  updateSimDisplay();
}
function updateSimDisplay(){
  const onSet=switchStates; // すでにMap
  const{hasNormal,hasShort,litLoads}=getCircuitStatus(onSet);
  const litIds=new Set(litLoads.map(u=>u.id));

  // スイッチラベル更新
  units.filter(u=>u.def.category==='switch'||u.def.category==='timer').forEach(u=>{
    const el=document.getElementById(u.id);if(!el)return;
    let lbl=el.querySelector('.sim-sw-label');
    if(!lbl){lbl=document.createElement('div');lbl.className='sim-sw-label';el.appendChild(lbl);}
    lbl.style.left=(PADDING+IMG_W/2)+'px';
    lbl.style.top=(PADDING+IMG_H+4)+'px';
    lbl.style.transform='translateX(-50%)';
    if(u.type==='toggle_sw'){
      const side=switchStates.get(u.id);
      el.classList.add('sw-on');
      let lbl2=el.querySelector('.sim-sw-label-p2');
      if(!lbl2){lbl2=document.createElement('div');lbl2.className='sim-sw-label sim-sw-label-p2';el.appendChild(lbl2);}
      lbl2.textContent='②列ON';
      lbl2.className='sim-sw-label sim-sw-label-p2 '+(side==='p2'?'on':'off');
      lbl2.style.left=(PADDING+IMG_W/2-54)+'px';
      lbl2.style.top=(PADDING-22)+'px';
      lbl2.style.transform='';
      let lbl6=el.querySelector('.sim-sw-label-p6');
      if(!lbl6){lbl6=document.createElement('div');lbl6.className='sim-sw-label sim-sw-label-p6';el.appendChild(lbl6);}
      lbl6.textContent='⑥列ON';
      lbl6.className='sim-sw-label sim-sw-label-p6 '+(side==='p6'?'on':'off');
      lbl6.style.left=(PADDING+IMG_W/2+2)+'px';
      lbl6.style.top=(PADDING-22)+'px';
      lbl6.style.transform='';
      lbl.style.display='none';
    } else if(u.type==='timer_btn'||u.type==='timer_tilt'){
      // タイマー: ON中は「ON（2秒）」、OFF時は「タップでON」
      const isOn=switchStates.get(u.id)||false;
      lbl.textContent=isOn?'ON（2秒）':'タップでON';
      lbl.className='sim-sw-label '+(isOn?'on':'off');
      el.classList.toggle('sw-on',isOn);
    } else if(u.type==='lightsensor'){
      // 光センサー: ON=暗い時、OFF=明るい時
      const isOn=switchStates.get(u.id)||false;
      lbl.textContent=isOn?'ON（暗い）':'OFF（明るい）';
      lbl.className='sim-sw-label '+(isOn?'on':'off');
      el.classList.toggle('sw-on',isOn);
    } else {
      const isOn=switchStates.get(u.id)||false;
      lbl.textContent=isOn?'ON':'OFF';
      lbl.className='sim-sw-label '+(isOn?'on':'off');
      el.classList.toggle('sw-on',isOn);
    }
  });

  // 負荷ラベル更新
  units.filter(u=>u.def.category==='load').forEach(u=>{
    const el=document.getElementById(u.id);if(!el)return;
    const isLit=litIds.has(u.id);
    el.classList.toggle('load-on',isLit);
    let lbl=el.querySelector('.sim-load-label');
    if(!lbl){lbl=document.createElement('div');lbl.className='sim-load-label';el.appendChild(lbl);}
    const name=LOAD_LABELS[u.type]||u.def.label;
    lbl.textContent=name+(isLit?' ON!':' OFF');
    lbl.className='sim-load-label '+(isLit?'on':'off');
    lbl.style.left=(PADDING+IMG_W/2)+'px';
    lbl.style.top=(PADDING+IMG_H+4)+'px';
    lbl.style.transform='translateX(-50%)';
  });

  // ステータス
  if(hasShort){
    document.getElementById('sim-status').textContent='⚠️ ショート！負荷なしで電源がつながっています';
  } else if(litLoads.length>0){
    document.getElementById('sim-status').textContent='💡 '+litLoads.map(u=>u.def.label).join('・')+' が点灯中！';
  } else {
    // タイマー/光センサーの直結チェック警告
  const specialWarnings=[];
  units.filter(u=>u.type==='timer_btn'||u.type==='timer_tilt'||u.type==='lightsensor').forEach(u=>{
    const spPin=u.type==='lightsensor'?'p2':'p1';
    const pinNum=u.type==='lightsensor'?'②':'①';
    if(!isSpecialPinDirectConnected(u.id,spPin)){
      specialWarnings.push(u.def.label+'の'+pinNum+'番を電源③に直接接続してください');
    }
  });
  if(specialWarnings.length>0){
    const ss=document.getElementById('sim-status');
    ss.textContent='⚠️ '+specialWarnings.join('　');
    ss.classList.add('sim-status-warn');
  } else {
    const ss=document.getElementById('sim-status');
    ss.textContent='スイッチをクリックしてON/OFFしよう！';
    ss.classList.remove('sim-status-warn');
  }
  }
}

function exportImage(){
  const f=getInfoFields();
  const fields=[{id:'f-grade',val:f.grade,label:'学年'},{id:'f-kumi',val:f.kumi,label:'組'},
    {id:'f-num',val:f.num,label:'出席番号'},{id:'f-name',val:f.name,label:'氏名'},{id:'f-title',val:f.title,label:'作品名'}];
  fields.forEach(fi=>document.getElementById(fi.id).classList.remove('err'));
  const missing=fields.filter(fi=>!fi.val);
  if(missing.length>0){
    missing.forEach(fi=>document.getElementById(fi.id).classList.add('err'));
    document.getElementById('popup-missing').innerHTML=missing.map(fi=>'<li>'+fi.label+'</li>').join('');
    document.getElementById('info-popup').classList.add('show');return;
  }
  const hl=document.getElementById('handle-layer');
  const pins=document.querySelectorAll('.pin-dot');
  hl.style.display='none';pins.forEach(p=>p.style.display='none');
  html2canvas(document.getElementById('canvas'),{backgroundColor:'#fdf6ff',scale:2,useCORS:true,logging:false})
    .then(canvas=>{
      hl.style.display='';pins.forEach(p=>p.style.display='');
      const a=document.createElement('a');a.href=canvas.toDataURL('image/png');
      a.download=buildFileName()+'.png';a.click();
    }).catch(()=>{hl.style.display='';pins.forEach(p=>p.style.display='');alert('画像の出力に失敗しました');});
}
function closeInfoPopup(){document.getElementById('info-popup').classList.remove('show');}

// ===== 保存・読込 =====
function saveCircuit(){
  const info=getInfoFields();
  const batUnit=units.find(u=>u.id===BATTERY_ID);
  const data={version:18,info,batteryPos:batUnit?{x:batUnit.x,y:batUnit.y}:null,
    units:units.filter(u=>u.id!==BATTERY_ID).map(u=>({id:u.id,type:u.type,x:u.x,y:u.y})),wires,nextId};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  const f=getInfoFields();
  const fname=(f.grade&&f.kumi&&f.name&&f.title)?buildFileName():'回路設計';
  a.download=fname+'.json';a.click();
}
function loadCircuit(){document.getElementById('file-input').click();}
function onFileLoad(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(simMode)exitSim();
      units=units.filter(u=>u.id===BATTERY_ID);wires=[];
      document.querySelectorAll('#units-layer .unit-block:not(#'+BATTERY_ID+')').forEach(e=>e.remove());
      document.getElementById('handle-layer').innerHTML='';document.getElementById('canvas-svg').innerHTML='';
      nextId=data.nextId||1;
      if(data.info){
        document.getElementById('f-grade').value=data.info.grade||'';document.getElementById('f-kumi').value=data.info.kumi||'';
        document.getElementById('f-num').value=data.info.num||'';document.getElementById('f-name').value=data.info.name||'';
        document.getElementById('f-title').value=data.info.title||'';
      }
      if(data.batteryPos){const bat=units.find(u=>u.id===BATTERY_ID);if(bat){bat.x=data.batteryPos.x;bat.y=data.batteryPos.y;renderUnit(bat);}}
      (data.units||[]).forEach(u=>{const def=UNIT_DEFS.find(d=>d.type===u.type);if(!def)return;
        const unit={id:u.id,type:u.type,x:u.x,y:u.y,def};units.push(unit);renderUnit(unit);});
      wires=data.wires||[];renderAll();
    }catch{alert('読み込み失敗');}
  };
  reader.readAsText(file);e.target.value='';
}
// ===== 拡大縮小 =====
let canvasScale=1.0;
const SCALE_STEP=0.1, SCALE_MIN=0.4, SCALE_MAX=2.0;

function applyZoom(){
  document.getElementById('canvas-inner').style.transform='scale('+canvasScale+')';
  document.getElementById('zoom-label').textContent=Math.round(canvasScale*100)+'%';
  renderAll(); // ハンドル位置を再計算
}
function zoomIn(){canvasScale=Math.min(SCALE_MAX,Math.round((canvasScale+SCALE_STEP)*10)/10);applyZoom();}
function zoomOut(){canvasScale=Math.max(SCALE_MIN,Math.round((canvasScale-SCALE_STEP)*10)/10);applyZoom();}
function zoomReset(){canvasScale=1.0;applyZoom();}

// マウス座標をキャンバス内座標に変換（スケール考慮）
function canvasPos(clientX,clientY){
  const r=document.getElementById('canvas').getBoundingClientRect();
  return{x:(clientX-r.left)/canvasScale, y:(clientY-r.top)/canvasScale};
}

buildPalette();
placeBattery();
</script>
